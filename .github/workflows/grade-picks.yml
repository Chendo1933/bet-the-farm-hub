name: Nightly Pick Grader

# Runs 30min after log-results.yml (08:00 UTC) so the day's results file is
# committed and on-disk before grading kicks off. 08:30 UTC = 4:30 AM ET —
# graded picks are ready before Cole's morning review.
on:
  schedule:
    - cron: "30 8 * * *"   # 08:30 UTC = 4:30 AM ET / 1:30 AM PT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grade-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Grade yesterday's picks against results
        run: python scripts/grade_picks.py

      - name: Commit updated performance log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/performance.json data/pick_history.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No grading changes to commit"
          else
            git commit -m "perf: grade picks $(date -d 'yesterday' +'%Y-%m-%d')"
            git push --force-with-lease
            echo "✅ Performance log updated"
          fi
