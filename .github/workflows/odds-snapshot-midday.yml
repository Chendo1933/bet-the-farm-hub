name: Odds Snapshot — Midday

# Captures the midday line read — most pro money flows in by ~noon ET,
# so this snapshot is a strong baseline for the rest-of-day F12 signal.
on:
  schedule:
    - cron: "0 16 * * *"   # 16:00 UTC = 12:00 PM ET (DST) / 11:00 AM ET (standard)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Capture midday odds snapshot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/snapshot_odds.py --label midday

      - name: Commit and push if a snapshot was written
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/odds_snapshots/
          if git diff --staged --quiet; then
            echo "No new snapshot — nothing to commit"
          else
            git commit -m "auto: midday odds snapshot $(date +'%Y-%m-%d')"
            git pull --rebase origin main || true
            git push --force-with-lease
            echo "✅ Pushed midday snapshot"
          fi

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      snapshot
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Midday odds snapshot failed — F12 line-movement signal will fall back to morning baseline only"
