name: Daily Pick Logger

# Triggered by the Daily Stats Update COMPLETING — not its own cron. GitHub
# delays scheduled runs unpredictably (~1-3h under load), which previously let
# the independent pick cron drift to ~1:30-2 PM ET AND risked it racing the
# (also-delayed) stats update. Chaining off stats guarantees the correct order
# — fresh standings are always committed before picks are generated — and makes
# the whole bet chain key off a single scheduled job (stats, 10:00 UTC). With
# stats' typical delay the chain now places bets ~8:45 AM ET (worst case
# ~9:45 AM), before early MLB day games.
#
# If stats FAILS, this won't fire and no morning snapshot is produced — the
# 12:30 PM Backup/Verify logger + the conditional failsafe (kalshi-failsafe-
# place.yml) catch that case and place the day's bets.
on:
  workflow_run:
    workflows: ["Daily Stats Update"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-picks:
    # Only run when Stats Update succeeded (so standings are fresh) or on a
    # manual dispatch. If stats failed, skip — the failsafe covers that day.
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Log today's Elite + Strong picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/log_picks.py

      - name: Commit picks and schedule snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/picks/ data/schedules/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new picks or schedule data to commit"
          else
            git commit -m "picks: $(date +'%Y-%m-%d') Elite/Strong + schedule snapshot"
            git push --force-with-lease
            echo "✅ Picks and schedule snapshot committed"
          fi

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      log-picks
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Primary 10:30 AM ET pick logger (triggers the live bet chain) — today's slate may be missing or stale"
