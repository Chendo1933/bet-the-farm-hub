name: Daily Pick Logger

# Runs at noon ET (when most lines are posted) + manual trigger
on:
  schedule:
    - cron: "0 17 * * *"   # 17:00 UTC = 1:00 PM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Log today's Elite + Strong picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/log_picks.py

      - name: Commit picks if any were captured
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/picks/
          if git diff --staged --quiet; then
            echo "No new picks to commit"
          else
            git commit -m "picks: $(date +'%Y-%m-%d') Elite/Strong logged"
            git push
            echo "✅ Picks committed"
          fi
