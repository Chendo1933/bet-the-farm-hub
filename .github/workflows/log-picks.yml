name: Daily Pick Logger

# Runs at 10:30 AM ET + manual trigger. Moved earlier (was 11:50 AM) so the
# pickâ†’dry-runâ†’place-orders chain finishes (~10:45 AM ET) BEFORE early MLB day
# games (earliest realistic first pitch ~11:00 AM ET) and weekend afternoon
# NBA/NHL. The full slate â€” including evening games â€” already has open Kalshi
# markets and posted odds by mid-morning, so nothing is lost by going earlier;
# for our underpriced-favorite ML edge, getting in before the public moves the
# price is neutral-to-favorable. All upstream deps still precede this (results/
# reconcile ~4 AM, ATS refresh 5:30 AM, stats update 7 AM) and the health check
# (1:30 PM) still runs after placement.
on:
  schedule:
    - cron: "30 14 * * *"   # 14:30 UTC = 10:30 AM ET (EDT) / 9:30 AM ET (EST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Log today's Elite + Strong picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/log_picks.py

      - name: Commit picks and schedule snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/picks/ data/schedules/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new picks or schedule data to commit"
          else
            git commit -m "picks: $(date +'%Y-%m-%d') Elite/Strong + schedule snapshot"
            git push --force-with-lease
            echo "âś… Picks and schedule snapshot committed"
          fi

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      log-picks
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Primary 10:30 AM ET pick logger (triggers the live bet chain) â€” today's slate may be missing or stale"
