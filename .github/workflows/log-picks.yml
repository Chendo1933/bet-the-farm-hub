name: Daily Pick Logger

# Runs at 11:50 AM ET (10 min before noon games) + manual trigger
on:
  schedule:
    - cron: "50 15 * * *"   # 15:50 UTC = 11:50 AM ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Log today's Elite + Strong picks
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/log_picks.py

      - name: Commit picks and schedule snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/picks/ data/schedules/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new picks or schedule data to commit"
          else
            git commit -m "picks: $(date +'%Y-%m-%d') Elite/Strong + schedule snapshot"
            git pull --rebase
            git push
            echo "✅ Picks and schedule snapshot committed"
          fi
