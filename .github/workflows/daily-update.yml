name: Daily Stats Update

# Runs every morning + can be triggered manually from GitHub Actions tab.
# This is now the HEAD of the daily bet chain: on completion it triggers the
# Daily Pick Logger (workflow_run), which triggers Dry-Run → Place Orders. So
# the whole live-bet chain keys off when THIS finishes. Scheduled at 10:00 UTC
# (6:00 AM ET) — earlier than before — so that even with GitHub's typical
# ~2.5h scheduled-run delay, the chain places bets by ~8:45 AM ET (worst case
# ~9:45 AM), comfortably before early MLB day games (~11 AM ET first pitch).
# 10:00 UTC is still well after overnight West Coast games finish (~1-2 AM ET).
on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 6:00 AM ET (EDT) / 5:00 AM ET (EST)
  workflow_dispatch:         # "Run workflow" button in GitHub Actions tab

permissions:
  contents: write            # needed to commit and push back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Morning odds snapshot (for line-movement tracking)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/snapshot_odds.py --label morning

      - name: Fetch MLB wind + temp from NWS for today's slate
        # No API key (NWS is free). Lands before log-picks at 11:50am ET so
        # hbScoreOU can read it via data/weather/{date}.json.
        run: python scripts/fetch_mlb_weather.py || echo "weather fetch failed (non-fatal)"

      - name: Backfill MLB starters + game logs for today
        # Updates data/pitcher_data.json with today's probable pitchers and
        # each starter's cumulative season stats. Lands BEFORE log-picks +
        # the dry-run so the F5 paper-track generator has fresh pitcher data.
        # Idempotent — only fetches dates/pitchers not already cached.
        # Soft-fails on network blips since F5 is paper-only (no live money
        # at risk if it's stale).
        run: python scripts/backfill_pitcher_data.py || echo "pitcher backfill failed (non-fatal)"

      - name: Fetch ESPN standings and patch hub (NBA · NHL · MLB · NFL)
        run: python scripts/update_stats.py

      - name: Fetch ESPN injury reports and patch hub (NBA · NHL · MLB)
        run: python scripts/update_injuries.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/odds_snapshots/ data/weather/ data/pitcher_data.json
          if git diff --staged --quiet; then
            echo "Nothing changed — hub already up to date"
            exit 0
          fi
          git commit -m "auto: update stats + injuries $(date +'%Y-%m-%d')"
          # Retry the rebase+push: a transient GitHub-side error
          # (`fatal error in commit_refs`) killed this two days in a row when
          # the first attempt failed and the workflow gave up. Each attempt
          # fetches fresh, rebases ours on top, and retries with backoff.
          for i in 1 2 3 4; do
            if ! git pull --rebase origin main; then
              git rebase --abort 2>/dev/null || true
              echo "Rebase failed on attempt $i — resetting and retrying"
              git fetch origin main && git reset --hard origin/main
              # Re-stage and re-commit our changes on top of the fresh remote
              git add index.html data/odds_snapshots/ data/weather/ data/pitcher_data.json
              git diff --staged --quiet && { echo "Nothing to push after reset"; exit 0; }
              git commit -m "auto: update stats + injuries $(date +'%Y-%m-%d')"
            fi
            if git push --force-with-lease; then
              echo "✅ Pushed updated stats + injuries (attempt $i)"
              exit 0
            fi
            echo "Push failed on attempt $i — sleeping $((i*15))s and retrying"
            sleep $((i*15))
          done
          echo "✗ Push failed after 4 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      update
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Morning daily-update — stats/injuries/odds snapshot may be stale; live hub line-movement signal will skip"
