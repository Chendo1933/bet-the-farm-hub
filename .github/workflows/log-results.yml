name: Nightly Results Logger

# Runs every night after US games finish + can be triggered manually
# 08:00 UTC chosen so Pacific late-start games (10pm PT first pitch / puck drop)
# plus extra innings / OT are all final. Previous 03:00 UTC was ~11pm ET /
# 8pm PT — too early for West Coast slates, which orphaned late-game picks.
on:
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC = 4:00 AM ET / 1:00 AM PT — all US games final
  workflow_dispatch:        # "Run workflow" button in GitHub Actions tab

permissions:
  contents: write           # needed to commit results files back to repo

jobs:
  log-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and log game results
        run: python scripts/log_results.py

      - name: Commit results if any new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/
          if git diff --staged --quiet; then
            echo "No new results to commit"
          else
            git commit -m "results: $(date -d 'yesterday' +'%Y-%m-%d') game log"
            git push --force-with-lease
            echo "✅ Results committed"
          fi

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      log-results
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Nightly results logger — grade-picks chain will be skipped, no grading update tonight"
