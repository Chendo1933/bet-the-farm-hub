name: Nightly Results Logger

# Runs every night after US games finish + can be triggered manually
on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC = ~11:00 PM ET (after West Coast games end)
  workflow_dispatch:        # "Run workflow" button in GitHub Actions tab

permissions:
  contents: write           # needed to commit results files back to repo

jobs:
  log-results:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and log game results
        run: python scripts/log_results.py

      - name: Commit results if any new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/
          if git diff --staged --quiet; then
            echo "No new results to commit"
          else
            git commit -m "results: $(date -d 'yesterday' +'%Y-%m-%d') game log"
            git push --force-with-lease
            echo "✅ Results committed"
          fi
