name: Calibration Watch (MLB ML gate)

# Forward-validation for lowering the live MLB ML gate from cal>=65 to ~60.
# The 60-64 score band tested +12.7% ROI IN-SAMPLE (the data that revealed
# the edge), so we don't act on it directly — that'd be circular. Instead this
# weekly job grades only OUT-OF-SAMPLE picks (logged on/after the validation
# start date, already accumulating in data/picks/ + data/results/) and pushes
# the growing record + a promote/accumulate/fail verdict to the phone.
#
# No Kalshi keys needed — it only reads committed picks/results files. When the
# 60-64 band reaches enough out-of-sample picks AND stays profitable, the push
# says READY and we can lower the gate with real forward evidence.

on:
  schedule:
    - cron: "0 14 * * 1"   # 14:00 UTC = 10:00 AM ET Mondays
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Push MLB ML gate watch
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python scripts/analyze_calibration_mlb.py --notify

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      watch
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Calibration watch failed — the 60-64 gate forward-validation didn't run."
