name: Kalshi Daily Plan

# Fires after Kalshi Place Orders (Live) completes — at ~12:10 PM ET.
# By then place_orders.py has written today's receipts to
# data/kalshi_orders/{today}.json. We send a push notification with
# the actual just-placed bets so the operator can see what real
# money went out today (no more "we won/lost yesterday but didn't
# place any today" confusion that the recap-only version produced).
#
# Read-only: never modifies config, never places orders.
on:
  workflow_run:
    workflows: ["Kalshi Place Orders (Live)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send today's-bets notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        # stdlib only — no pip install needed
        run: python scripts/kalshi/daily_summary.py --mode plan

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      plan
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Today's-bets notification skipped — orders are still placed/committed, only the ping failed"
