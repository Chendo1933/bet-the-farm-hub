name: Kalshi Daily Plan

# MANUAL FALLBACK ONLY. The automatic "today's bets" push is now sent INLINE by
# the Kalshi Place Orders (Live) job (and the failsafe job) — not here.
#
# Why: this used to trigger on Place Orders completion, but after the bet chain
# was re-headed on Stats Update (Stats→Picks→Dry-Run→Place→Plan) it sat 4
# workflow_run levels deep, and GitHub does NOT propagate workflow_run events
# that deep — so it silently stopped firing (no run created at all). Sending the
# push from inside the Place Orders job makes it depth-independent. This file is
# kept so you can re-send today's plan on demand via "Run workflow"; the
# workflow_run trigger is removed to avoid a double push if GitHub ever delivers
# the deep event.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  plan:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send today's-bets notification
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        # stdlib only — no pip install needed
        run: python scripts/kalshi/daily_summary.py --mode plan

      - name: Notify on failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          webhook:  ${{ secrets.WEBHOOK_URL }}
          workflow: ${{ github.workflow }}
          job:      plan
          run-url:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          context:  "Today's-bets notification skipped — orders are still placed/committed, only the ping failed"
