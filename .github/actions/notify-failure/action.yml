name: 'Notify on workflow failure'
description: 'POST a notification to a webhook URL when a workflow fails. Auto-detects ntfy.sh vs Discord vs generic JSON. Silent no-op if WEBHOOK_URL secret is not set.'

inputs:
  webhook:
    description: 'Webhook URL. Auto-detected: ntfy.sh (plain text + headers), Discord (JSON {content}), or generic JSON {content}.'
    required: true
  workflow:
    description: 'Workflow name (typically github.workflow).'
    required: true
  job:
    description: 'Job name (optional — included if provided).'
    required: false
    default: ''
  run-url:
    description: 'Direct link to the failing run on github.com.'
    required: true
  context:
    description: 'Optional one-line context for what was being attempted (e.g., "Picks logger" / "Nightly grader").'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Send failure notification
      shell: bash
      env:
        WEBHOOK:  ${{ inputs.webhook }}
        WORKFLOW: ${{ inputs.workflow }}
        JOB:      ${{ inputs.job }}
        RUN_URL:  ${{ inputs.run-url }}
        CONTEXT:  ${{ inputs.context }}
      run: |
        # Silent skip if the secret isn't wired up yet — lets us land this
        # composite action before the WEBHOOK_URL secret is added in repo
        # settings, without breaking workflow runs in the meantime.
        if [ -z "$WEBHOOK" ]; then
          echo "WEBHOOK_URL not set — notification skipped"
          exit 0
        fi

        # Build the human-readable message body. Same format across all
        # notification backends — the wire encoding is what differs.
        TITLE_LINE="🚨 BTF workflow failed: $WORKFLOW"
        if [ -n "$JOB" ]; then TITLE_LINE="$TITLE_LINE / $JOB"; fi
        BODY="$TITLE_LINE"
        if [ -n "$CONTEXT" ]; then BODY="$BODY"$'\n'"$CONTEXT"; fi
        BODY="$BODY"$'\n'"$RUN_URL"

        # Auto-detect destination from URL host so the user can swap between
        # ntfy.sh / Discord / Slack without code changes — just paste a
        # different URL into the WEBHOOK_URL secret.
        if echo "$WEBHOOK" | grep -qiE 'ntfy\.sh|/ntfy/'; then
          # ntfy.sh accepts plain text body + headers for title/priority/tags.
          # https://docs.ntfy.sh/publish/
          # Title goes in X-Title header, body is the plain text post.
          # Priority 4 = high (shows on iOS lock screen even with focus on).
          if curl -sS -f -X POST \
               -H "Title: BTF workflow failed" \
               -H "Priority: 4" \
               -H "Tags: warning,rotating_light" \
               -d "$BODY" \
               "$WEBHOOK" -o /dev/null; then
            echo "✅ Failure notification sent (ntfy.sh)"
          else
            echo "⚠ Notification POST returned non-2xx (continuing anyway)"
          fi
        else
          # Discord / Slack-style: JSON with "content" field. Slack also
          # accepts "text" instead — both fields are harmless to include.
          PAYLOAD=$(jq -n --arg msg "$BODY" '{content: $msg, text: $msg}')
          if curl -sS -f -X POST -H 'Content-Type: application/json' \
               -d "$PAYLOAD" "$WEBHOOK" -o /dev/null; then
            echo "✅ Failure notification sent (json webhook)"
          else
            echo "⚠ Notification POST returned non-2xx (continuing anyway)"
          fi
        fi
